name: Services Tests

on:
  push:
    paths:
      - "Storitev-izdelki/**"
      - "storitev-primerjava-cen/**"
      - "storitev-trgovine/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  test-product-service:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/Storitev-izdelki
    defaults:
      run:
        working-directory: Storitev-izdelki

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q tests

  test-comparison-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storitev-primerjava-cen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  test-store-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storitev-trgovine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run unit tests
        run: mvn -B clean test