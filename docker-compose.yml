services:
  product-service:
    build:
      context: ./Storitev-izdelki
    container_name: pricescout-product-service
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-PriceScout Product Service}
      APP_ENV: ${APP_ENV:-docker}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL is required}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-product_logs}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  comparison-service:
    build:
      context: ./storitev-primerjava-cen
    container_name: pricescout-comparison-service
    ports:
      - "50051:50051"
    environment:
      GRPC_HOST: ${GRPC_HOST:-0.0.0.0}
      GRPC_PORT: ${GRPC_PORT:-50051}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  postgres:
    image: postgres:16-alpine
    container_name: pricescout-products-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - products_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pricescout-products-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  products_pg_data: